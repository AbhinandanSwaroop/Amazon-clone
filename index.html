<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>amazon clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo">  
                </div>
            </div>
            <div class="nav-add border">
                <p class="add-first">Deliver to</p>
                <div class="nav-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-sec">India</p>
                </div>
            </div>
        <div class="nav-search">
            <select>
                <option>All</option>
            </select>
            
            <input type="text" placeholder="search amazon">
            
            <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>
        <div class="nav-signin border">
            <p><span>Hello, sign in</span></p>
            <p class="nav-second">Account & Lists</p>

        </div>
        <div class="orders border">
             <p><span>Returns</span></p>
            <p class="nav-second">& Orders</p>

        </div>
        <div class="nav-cart border">
            <i class="fa-solid fa-cart-shopping"></i>
            <p>Cart</p>
        </div>
    </div>
<div class="panel">
    <div class="panel-icon border">
        <i class="fa-solid fa-bars"></i>All
    </div>
    <div class="MX-Player border"><p>MX Player</p></div>
    <div class="sell border"><p>Sell</p></div>
    <div class="best-seller border"><p>Best Seller</p></div>
    <div class="deal border"><p>Today's Deal</p></div>
    <div class="mobiles border"><p>Mobiles</p></div>
    <div class="releases border"><p>New Releases</p></div>
    <div class="prime border"><p>Prime</p></div>
    <div class="services border"><p>Customer Services</p></div>
    <div class="Pay border"><p>Amazon Pay</p></div>
    <div class="elecronics border"><p>Electronics</p></div>
    <div class="fashion border"><p>Fashion</p></div>
    <div class="kitchen border"><p>Home & Kitchen</p></div>
    <div class="computers border"><p>Computers</p></div>
    <div class="toys border"><p>Toys & Games</p></div>
    
</div>



    </header>
    
    



</body>
</html>
